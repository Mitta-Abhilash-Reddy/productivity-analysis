<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- CSP: block all external resources for security -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'unsafe-inline'; script-src 'self' 'unsafe-inline'" />
  <title>WorkTracker Setup</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #1a1a2e;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 32px 28px;
      width: 360px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      color: #2563eb;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: #2563eb; }
    input[type="text"].error { border-color: #ef4444; }

    .error-msg {
      font-size: 12px;
      color: #ef4444;
      margin-top: 4px;
      min-height: 16px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0 24px;
    }

    .checkbox-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #2563eb;
      cursor: pointer;
    }

    .checkbox-row span {
      font-size: 13px;
      color: #374151;
      cursor: pointer;
      user-select: none;
    }

    button {
      width: 100%;
      padding: 11px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    button:hover { background: #1d4ed8; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🖥 WorkTracker</div>
    <div class="subtitle">One-time setup — takes 10 seconds</div>

    <label for="userId">Employee ID</label>
    <input
      type="text"
      id="userId"
      placeholder="e.g. emp_john_001"
      autocomplete="off"
      spellcheck="false"
    />
    <div class="error-msg" id="errorMsg"></div>

    <div class="checkbox-row">
      <input type="checkbox" id="autoStart" checked />
      <span onclick="document.getElementById('autoStart').click()">
        Start automatically on system login
      </span>
    </div>

    <button id="submitBtn" onclick="handleSubmit()">Start Tracking</button>
  </div>

  <script>
    const userIdInput = document.getElementById("userId");
    const errorMsg = document.getElementById("errorMsg");
    const submitBtn = document.getElementById("submitBtn");

    // Clear error on typing
    userIdInput.addEventListener("input", () => {
      userIdInput.classList.remove("error");
      errorMsg.textContent = "";
    });

    // Allow Enter key submission
    userIdInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") handleSubmit();
    });

    async function handleSubmit() {
      const userId = userIdInput.value.trim();
      const enableAutoStart = document.getElementById("autoStart").checked;

      // Client-side validation
      if (!userId || userId.length < 2) {
        userIdInput.classList.add("error");
        errorMsg.textContent = "Employee ID must be at least 2 characters.";
        userIdInput.focus();
        return;
      }

      // Disable button to prevent double-submit
      submitBtn.disabled = true;
      submitBtn.textContent = "Saving...";

      // Send to main process via preload bridge
      window.tracker.submitSetup({ userId, enableAutoStart });
    }

    // Focus input on load
    window.addEventListener("DOMContentLoaded", () => userIdInput.focus());
  </script>
</body>
</html>
